services:
  postgres:
    image: postgres:16-alpine
    container_name: mache-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-mecha}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-password.sh:/docker-entrypoint-initdb.d/init-password.sh:ro
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-mecha}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mache-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      DB_HOST: postgres
    ports:
      - "${PORT:-3001}:${PORT:-3001}"
    volumes:
      - uploads:/app/storages/uploads
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  uploads:
